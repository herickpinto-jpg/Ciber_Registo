<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário de Registo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:35px;
    border-radius:15px;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{
    background:#0056b3;
}

/* Popup */

.popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
    justify-content:center;
    align-items:center;
}

.popup-content{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:300px;
    animation:popup .3s;
}

.popup-content h3{
    color:green;
    margin-bottom:15px;
}

.popup-content button{
    width:auto;
    padding:10px 20px;
}


@keyframes popup{
    from{
        transform:scale(.7);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}
</style>

</head>
<body>

<div class="container">
    <h2>Registo</h2>

    <input type="text" id="nome" placeholder="Nome">

    <input type="email" id="email" placeholder="Email">

    <input type="password" id="senha" placeholder="Senha">

    <button onclick="registar()">Confirmar</button>
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h3>✔ Registo concluído com sucesso!</h3>
        <p>Os seus dados foram registados.</p>
        <br>
        <button onclick="fecharPopup()">OK</button>
    </div>
</div>

<script>

function registar(){

    let nome=document.getElementById("nome").value.trim();
    let email=document.getElementById("email").value.trim();
    let senha=document.getElementById("senha").value.trim();

    if(nome==="" || email==="" || senha===""){
        alert("Preencha todos os campos.");
        return;
    }

    document.getElementById("popup").style.display="flex";
}

function fecharPopup(){
    document.getElementById("popup").style.display="none";

    document.getElementById("nome").value="";
    document.getElementById("email").value="";
    document.getElementById("senha").value="";
}

</script>

</body>
</html>
